name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and run unit tests
        run: mvn clean verify -B

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            user-service/target/site/jacoco/
            menu-order-service/target/site/jacoco/
            notification-service/target/site/jacoco/

  newman-tests:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build services
        run: mvn clean package -DskipTests -B

      - name: Start services
        run: |
          java -jar user-service/target/user-service-0.0.1-SNAPSHOT.jar &
          java -jar menu-order-service/target/menu-order-service-0.0.1-SNAPSHOT.jar &
          java -jar notification-service/target/notification-service-0.0.1-SNAPSHOT.jar &

      - name: Wait for services to start
        run: |
          for port in 8081 8082 8083; do
            echo "Waiting for service on port $port..."
            for i in $(seq 1 30); do
              if curl -s http://localhost:$port/actuator/health > /dev/null 2>&1 || curl -s http://localhost:$port > /dev/null 2>&1; then
                echo "Service on port $port is up"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "Service on port $port failed to start"
                exit 1
              fi
              sleep 2
            done
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Postman tests with Newman
        run: |
          newman run postman/RafCafe.postman_collection.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-report.html \
            --folder "Auth" \
            --folder "Notifications" || true

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html
